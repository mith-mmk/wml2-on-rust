name: viewer

on:
  push:
    tags:
      - "wml*"

jobs:
  build:
    strategy:
      matrix:
#        os: [ubuntu-latest, windows-latest, macos-latest]
        os: [windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: install rust
        uses: dtolnay/rust-toolchain@stable

      - name: cache cargo
        uses: Swatinem/rust-cache@v2

      - name: build wml2viewer
        run: cargo build --release -p wml2viewer

      - name: zip windows
        if: matrix.os == 'windows-latest'
        run: |
          mkdir dist
          copy target/release/wml2viewer.exe dist/
          Compress-Archive -Path dist/wml2viewer.exe -DestinationPath dist/wml2viewer-windows.zip        
        shell: pwsh

      - name: zip (unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir dist
          cp target/release/wml2viewer dist/
          zip dist/wml2viewer-${{ matrix.os }}.zip dist/wml2viewer

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*